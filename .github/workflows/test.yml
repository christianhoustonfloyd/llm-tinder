name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # `npm ci` runs the postinstall `prisma generate` (schema only, no DB needed).
      - run: npm ci
      - run: npm run lint
      - run: npm test
